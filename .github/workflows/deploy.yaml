name : delpoy on ec2
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: set up aws
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.HOST }}
        username: ubuntu
        key: ${{ secrets.KEY }}
        script: |
          cd /home/ubuntu/ci-cd
          git pull origin main
          npm install
          pm2 restart index.js || pm2 start index.js  